{% set name = "darker" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: eb53776f037fcf42b1f5a56f62fb841cd871d95a78a388536dc91dc4355ce8bb

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - darker = darker.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel  >=0.21.0
    - pip
  run:
    - python >={{ python_min }}
    - black  >=22.3.0
    - darkgraylib  >=2.4.0,<3.0.dev0
    - toml   >=0.10.0
    - typing_extensions  >=4.0.1
  run_constrained:
    - black  >=24.10.0
    - flynt  >=0.76
    - isort    >=5.2.0
    - Pygments  >=2.15.0
    - pyupgrade  >=2.31.0
    - ruff  >=0.0.292

test:
  imports:
    - darker
  requires:
    - pip
    - black  >=22.3.0
    - darkgraylib  >=1.2.0,<1.3.dev0
    - graylint  >=1.1.1,<1.2.dev0
    - isort  >=5.0.1
    - python {{ python_min }}
  commands:
    - pip check
    - darker --help


about:
  home: https://github.com/akaihola/darker
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: Apply black reformatting to Python files only in regions changed since a given commit
  dev_url: https://github.com/akaihola/darker

extra:
  recipe-maintainers:
    - akaihola
    - martinRenou
